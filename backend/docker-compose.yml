services:

  postgres:
    image: postgres:16
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: task_tracker_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    networks:
      - db_network
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    container_name: redis_db
    image: redis/redis-stack-server:latest
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    environment:
      # REDIS_PASSWORD: password
      REDIS_PORT: 6379
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - db_network
  backend:
    container_name: backend
    build: .
    ports:
      - "8000:8000"
    networks:
      - db_network
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_healthy
networks:
  db_network:
    external: true

volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local

